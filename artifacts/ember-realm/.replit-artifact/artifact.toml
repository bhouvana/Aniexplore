kind = "web"
previewPath = "/"
title = "EmberRealm"
version = "1.0.0"
id = "artifacts/ember-realm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22162

[services.development]
run = "pnpm --filter @workspace/ember-realm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ember-realm", "run", "build" ]
publicDir = "artifacts/ember-realm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22162"
BASE_PATH = "/"
